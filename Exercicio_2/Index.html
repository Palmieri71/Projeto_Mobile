<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
        *{
            font-family: "Poppins", sans-serif;
        }
        body{
            background-color: #000000;
        }
        .container{
            top: 20px;
            margin-left: 200px;
            width: 1000px;
            justify-content: space-between;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            background-color:blueviolet ;
            border-radius: 10px;
        }
        .container-2{
            border-top: 100px;
            width:400px;
            border-radius: 10px;
            margin-left: 100px;
            background-color:blueviolet ;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .Letreiro, .produto {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr; 
            align-items: center;
        }

        .info-produto {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* só pra melhorar visual */
        .Letreiro {
            font-weight: bold;
            margin-bottom: 5px;
            top: 100px;
        }
        .produto article {
            margin-left: 12px;
        }

        .produto {
            margin-bottom: 7px;
        }
        
        input[type="text"] {
            width: 40px;
            padding: 5px;
            text-align: center;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 15px;
        }
        input[type="text"]:disabled {
            width: 40px;
            cursor: no-drop;
            padding: 5px;
            text-align: center;
            border-radius: 5px;
            margin-left: 15px;
        }
        input[type="checkbox"]{
            cursor: pointer;
        }
        .layout{
            display: flex;
            align-items: flex-start;
        }
        .parcelas{
            display: none;
        }
        .caixa-de-Pagamento{
            margin-left: 5px;
            display: grid;
        }
        .enviar{
            border-radius: 10px;
        }

    </style>
</head>
<body>
    <div class="layout">
        
        <div class="container">
            <div class="Letreiro">Controle de Vendas:</div>
            <div class="Letreiro">
                <label>Produto:</label>
                <label> Valor em R$:</label>
                <label> Quantidade:</label>
            </div>
            <div class="produto">
                <div class="info-produto">
                    <input type="checkbox" id="option1" name="option">
                    <label for="option1">GTA VI</label>
                </div>    
                    <article>R$299.90</article>
                    <input type="text" id="1" disabled>
            </div>

            <div class="produto">
                <div class="info-produto">
                    <input type="checkbox" id="option2" name="option">
                    <label for="option2">FIFA 24</label>
                </div>    
                <article>R$199.90</article>
                <input type="text" id="2" disabled>   
            </div>

            <div class="produto">
                <div class="info-produto">
                    <input type="checkbox" id="option3" name="option">
                    <label for="option3">Minecraft</label>
                </div>    
                <article>R$99.90</article>
                <input type="text" id="3" disabled>   
            </div>

            <div class="produto">
                <div class="info-produto">
                    <input type="checkbox" id="option4" name="option">
                    <label for="option4">Red Dead Redemption 2</label>
                </div>    
                <article>R$199.90</article>
                <input type="text" id="4" disabled>   
            </div>

            <div class="produto">
                <div class="info-produto">
                    <input type="checkbox" id="option5" name="option">
                    <label for="option5">The Witcher 3</label>
                </div>    
                <article>R$79.99</article>
                <input type="text" id="5" disabled>   
            </div>

            <div class="produto">
                <div class="info-produto">
                    <input type="checkbox" id="option6" name="option">
                    <label for="option6">Cyberpunk 2077</label>
                </div>    
                <article>R$199.90</article>
                <input type="text" id="6" disabled>   
            </div>

            <div class="produto">
                <div class="info-produto">
                    <input type="checkbox" id="option7" name="option">
                    <label for="option7">God of War</label>
                </div>    
                <article>R$199.90</article>
                <input type="text" id="7" disabled>   
            </div>

            <div class="produto">
                <div class="info-produto">
                    <input type="checkbox" id="option8" name="option">
                    <label for="option8">Resident Evil 4 (2023)</label>
                </div>    
                <article>R$199.90</article>
                <input type="text" id="8" disabled>   
            </div>

            <div class="produto">
                <div class="info-produto">
                    <input type="checkbox" id="option9" name="option">
                    <label for="option9">LEGO Batman: Legacy of the Dark Knight</label>
                </div>    
                <article>R$149.90</article>
                <input type="text" id="9" disabled>   
            </div>

            <div class="produto">
                <div class="info-produto">
                    <input type="checkbox" id="option10" name="option">
                    <label for="option10">Hollow Knight</label>
                </div>    
                <article>R$46.99</article>
                <input type="text" id="10" disabled>   
            </div>

            <div class="produto">
                <div class="info-produto">
                    <input type="checkbox" id="option11" name="option">
                    <label for="option11">Cuphead</label>
                </div>    
                <article>R$36.99</article>
                <input type="text" id="11" disabled>   
            </div>

            <div class="produto">
                <div class="info-produto">
                    <input type="checkbox" id="option12" name="option">
                    <label for="option12">Elden Ring</label>
                </div>    
                <article>R$229.90</article>
                <input type="text" id="12" disabled>   
            </div>
        </div>
        <aside>
            <article class="container-2">
                <article class="Letreiro">Forma de Pagamento</article>
                <div class="caixa-de-Pagamento">
                    <div class="forma_pagamento">
                        <form id="14">
                            <input type="radio" name="opcao" value="1"> Á vista<br>
                            <input type="radio" name="opcao" value="2"> Parcelado<br>
                        </form>
                        <select class="parcelas" id="13">
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                        </select>
                        <button class="enviar" onclick="calcular()">Calcular</button>
                        <div class="display" id="display"></div>
                    </div>
                </div>
            </article>
        </aside>
    </div>
</body>
<script>
    const produtos = document.querySelectorAll('.produto');
    let display= document.getElementById("display")
    let total=0
    let forma_pagamento=document.querySelectorAll('input[name="opcao"]');
    let parcelamento= document.getElementById("13")
    produtos.forEach(produto => {
        const checkbox = produto.querySelector('input[type="checkbox"]');
        const input = produto.querySelector('input[type="text"]');
        checkbox.addEventListener('change', () => {
            if (checkbox.checked) {
                input.disabled = false;
                input.focus(); 
            } else {
                input.disabled = true;
                input.value = "";
            }
        });
    });
    if(forma_pagamento==2){
        parcelamento.style.display = "inline";
    }
    forma_pagamento.forEach(radio => {
        radio.addEventListener("change", () => {
            if (radio.value === "2" && radio.checked) {
                parcelamento.style.display = "inline";
            }
            else if(radio.value==1){
                parcelamento.style.display = "none";
            }
        });
    });
    function calcular() {
        let total = 0;

        produtos.forEach(produto => {
            const checkbox = produto.querySelector('input[type="checkbox"]');
            const input = produto.querySelector('input[type="text"]');
            const preco = produto.querySelector('article').textContent;

            if (checkbox.checked && input.value !== "") {
                let quantidade = parseInt(input.value);
                let valor = parseFloat(preco.replace("R$", "").replace(",", "."));

                total += quantidade * valor;
            }
        });
        let forma = document.querySelector('input[name="opcao"]:checked');

        if (!forma) {
            display.innerHTML = "Escolha uma forma de pagamento!"
            return;
        }

        if (forma.value == "1") {
            let final= total-total/100*8.5;
            display.innerHTML = "Total: R$ " + final.toFixed(2);
        } 
        else if (forma.value == "2") {
            let parcelas = parcelamento.value;
            let total_parcelado=total+ total/100*6
            let valorParcela = total_parcelado / parcelas+ parcelas*10;
            if (valorParcela<75){
                display.innerHTML ="Não é possivel parcelar, \n o valor mínimo da parcela é R$75 e a sua parcela deu R$:"+valorParcela.toFixed(2);
            }
            else if(valorParcela>=75){
                display.innerHTML = `Total: R$ ${total_parcelado.toFixed(2)} <br> ${parcelas}x de R$ ${valorParcela.toFixed(2)}`;
            }
            
        }
    }

</script>
</html>
